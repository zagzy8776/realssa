app = "realssa-scraper"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[processes]
  web = "node --max-old-space-size=450 server.js"
  worker = "node --max-old-space-size=450 worker.js"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
